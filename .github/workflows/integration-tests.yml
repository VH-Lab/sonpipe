name: Integration tests (real sonpy)

# Exercises the REAL CED sonpy binding end-to-end against the checked-in
# example file (example/spike2data.smrx), on every platform.
#
# CED ships sonpy wheels for Python 3.14 on manylinux, macOS and Windows.
# Note: CED's macOS wheel is labelled universal2 but actually contains an
# x86_64-only binary (no native arm64), so on Apple Silicon (macos-14) we run
# an x86_64 Python under Rosetta 2 by requesting architecture x64. That keeps
# the real-sonpy suite green on all four platforms. (The fake-sonpy suites in
# cli-tests.yml run natively and cover more Python versions.)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: sonpy / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest    # Linux (manylinux wheel)
            arch: x64
          - os: windows-latest   # Windows
            arch: x64
          - os: macos-13         # macOS Intel
            arch: x64
          - os: macos-14         # macOS Apple Silicon -> x86_64 Python via Rosetta
            arch: x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          architecture: ${{ matrix.arch }}

      - name: Install sonpipe with the real CED sonpy
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test]

      - name: Verify sonpy is importable and exposes SonFile
        run: python -c "from sonpipe.sonfile import load_sonpy; m = load_sonpy(); print('sonpy module:', m.__name__, '-> SonFile:', hasattr(m, 'SonFile'))"

      - name: Run integration tests against example/spike2data.smrx
        run: python -m pytest -m integration -rs -v
