name: MATLAB tests

# matbox-style CI (mirroring VH-Lab/NDR-matlab) for the +sonpipe MATLAB
# wrappers. Runs the matlab.unittest suite across Linux, Windows, and macOS
# Apple Silicon (macos-14). The MATLAB tests drive a fake sonpipe CLI
# (Python + numpy), so CED's proprietary sonpy binaries are not required.
#
# Licensing: matlab-actions provides MathWorks licensing for free on PUBLIC
# repositories, so no token or secret is needed. (If this repo is kept private,
# MATLAB in CI requires a batch licensing token supplied via the
# MLM_LICENSE_TOKEN environment variable.)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: MATLAB / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest    # Linux
          - windows-latest   # Windows
          - macos-14         # macOS Apple Silicon

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python (for the fake sonpipe CLI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install numpy
        run: python -m pip install --upgrade pip numpy

      - name: Start virtual display server
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          Xvfb :99 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: latest
          cache: true

      - name: Run MATLAB unit tests
        uses: matlab-actions/run-command@v3
        with:
          command: |
            addpath(fullfile(pwd,'matlab'));
            addpath(fullfile(pwd,'test'));
            results = runtests('sonpipe.unittest', 'OutputDetail', 'Detailed');
            disp(table(results));
            assert(all(~[results.Failed]), 'Some sonpipe MATLAB tests failed');
